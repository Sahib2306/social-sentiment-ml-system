services:

  fastapi:
    build: .
    container_name: sentiment_fastapi
    ports:
      - "8000:8000"
    environment:
      - TF_SERVING_URL=http://tfserving:8501/v1/models/sentiment_v2:predict
    depends_on:
      - tfserving
    volumes:
      - .:/app

  tfserving:
    image: tensorflow/serving
    platform: linux/amd64
    container_name: sentiment_tfserving
    ports:
      - "8501:8501"
    volumes:
      - ./models/v2/serving/sentiment_v2:/models/sentiment_v2
    environment:
      - MODEL_NAME=sentiment_v2
